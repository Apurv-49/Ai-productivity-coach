<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Productivity Coach</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <h1>🚀 AI Productivity Coach</h1>

  <div class="box">
    <h2>👤 User Input</h2>
    <input id="focusInput" type="number" step="0.1" min="0" max="1" placeholder="Focus (0–1)" value="0.5">
    <input id="fatigueInput" type="number" step="0.1" min="0" max="1" placeholder="Fatigue (0–1)" value="0.3">
    <input id="distractionInput" type="text" placeholder="Distractions (e.g. youtube,instagram)" value="youtube,instagram">
  </div>

  <div class="controls">
    <button onclick="stepEnv()">⚡ Get AI Advice</button>
    <button onclick="resetSession()">🔄 Reset Session</button>
  </div>

  <div class="box">
    <h2>🤖 Action</h2>
    <p id="action">—</p>
  </div>

  <div class="box">
    <h2>💡 Reason</h2>
    <p id="reason">—</p>
  </div>

  <div class="box">
    <h2>🧠 AI Advice</h2>
    <p id="advice" class="typing">Click "Get AI Advice" to start.</p>
  </div>

  <div class="box">
    <h2>📊 Confidence</h2>
    <p id="confidence" class="badge">—</p>
  </div>

  <div class="box">
    <h2>📈 Current Session</h2>
    <canvas id="focusChart"></canvas>
  </div>

  <div class="box">
    <h2>📊 Previous Session</h2>
    <canvas id="prevChart"></canvas>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
