<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Productivity Coach</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <h1>🚀 AI Productivity Coach</h1>

  <!-- USER INPUT -->
  <div class="box">
    <h2> User Input</h2>

    <input id="focusInput" type="number" step="0.1" placeholder="Focus (0–1)">
    <input id="fatigueInput" type="number" step="0.1" placeholder="Fatigue (0–1)">
    <input id="distractionInput" type="text" placeholder="Distractions">
  </div>

  <!-- BUTTONS -->
  <div class="controls">
    <button onclick="stepEnv()">⚡ Get AI Advice</button>
    <button onclick="resetSession()">🔄 Reset Session</button>
  </div>

  <!-- OUTPUT -->
  <div class="box">
    <h2>🤖 Action</h2>
    <p id="action"></p>
  </div>

  <div class="box">
    <h2>💡 Reason</h2>
    <p id="reason"></p>
  </div>

  <div class="box">
    <h2>🧠 AI Advice</h2>
    <p id="advice" class="typing"></p>
  </div>

  <div class="box">
    <h2>📊 Confidence</h2>
    <p id="confidence" class="badge"></p>
  </div>

  <!-- CURRENT SESSION -->
  <div class="box">
    <h2>📈 Current Session</h2>
    <canvas id="focusChart"></canvas>
  </div>

  <!-- PREVIOUS SESSION -->
  <div class="box">
    <h2>📊 Previous Session</h2>
    <canvas id="prevChart"></canvas>
  </div>

  <script src="script.js"></script>
</body>
</html>
