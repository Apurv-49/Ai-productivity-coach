name: ai-productivity-coach

description: >
  A Reinforcement Learning based AI Productivity Coach that helps users
  optimize focus, reduce distractions, and manage fatigue in real-time.

version: "1.0"

author: Apurv

environment:
  observation_space:
    type: dict
    properties:
      focus:
        type: float
        min: 0
        max: 1
      fatigue:
        type: float
        min: 0
        max: 1
      distractions:
        type: int
        min: 0
        max: 10
      time_remaining:
        type: float

  action_space:
    type: discrete
    actions:
      - continue
      - take_break
      - block_distraction

tasks:
  - name: easy
    description: Low difficulty task with relaxed deadline
  - name: medium
    description: Moderate difficulty with balanced deadline
  - name: hard
    description: High difficulty with strict deadline

reward:
  type: dense
  description: >
    Rewards focus improvement, penalizes fatigue and distractions,
    includes time pressure penalties and clean-state bonuses.

evaluation:
  metric: score
  range: [0, 1]